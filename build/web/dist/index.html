    <script>
      window.addEventListener('error', function(e) {
        let err = document.createElement('div');
        err.style.cssText = 'color:red;font-size:24px;position:absolute;z-index:9999;background:black;padding:20px;';
        err.innerText = 'ERROR: ' + e.message;
        document.body.prepend(err);
      });
      window.addEventListener('unhandledrejection', function(e) {
        let err = document.createElement('div');
        err.style.cssText = 'color:orange;font-size:24px;position:absolute;z-index:9999;background:black;padding:20px;';
        err.innerText = 'PROMISE ERROR: ' + e.reason;
        document.body.prepend(err);
      });
    </script>
