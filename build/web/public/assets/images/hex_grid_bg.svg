<svg xmlns="http://www.w3.org/2000/svg" width="100" height="173.2" viewBox="0 0 100 173.2">
  <!-- futuristic hex grid with subtle neon glow -->
  <defs>
    <style>
      .hex {
        fill: none;
        stroke: rgba(0, 255, 221, 0.1);
        stroke-width: 1;
      }
      .hex-glow {
        fill: none;
        stroke: rgba(0, 255, 221, 0.3);
        stroke-width: 2;
      }
    </style>
  </defs>
  <!-- Background is transparent so it can overlay radial gradients -->

  <!-- Hexagon grid cells -->
  <path class="hex" d="M 50 0 L 100 28.86 L 100 86.6 L 50 115.47 L 0 86.6 L 0 28.86 Z" />
  <path class="hex" d="M 50 115.47 L 100 144.33 L 100 202.07 L 50 230.94 L 0 202.07 L 0 144.33 Z" />

  <path class="hex" d="M 100 86.6 L 150 115.47 L 150 173.2 L 100 202.07 L 50 173.2 L 50 115.47 Z" />
  <path class="hex" d="M 0 86.6 L 50 115.47 L 50 173.2 L 0 202.07 L -50 173.2 L -50 115.47 Z" />

  <path class="hex" d="M 100 -28.86 L 150 0 L 150 57.73 L 100 86.6 L 50 57.73 L 50 0 Z" />
  <path class="hex" d="M 0 -28.86 L 50 0 L 50 57.73 L 0 86.6 L -50 57.73 L -50 0 Z" />

  <!-- Intersection points glowing -->
  <circle cx="50" cy="115.47" r="1.5" fill="rgba(0, 255, 221, 0.5)" />
  <circle cx="100" cy="86.6" r="1.5" fill="rgba(0, 255, 221, 0.5)" />
  <circle cx="0" cy="86.6" r="1.5" fill="rgba(0, 255, 221, 0.5)" />
</svg>
