steps:
  # Build backend
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/webwar-490207/neohack-repo/backend:$SHORT_SHA'
      - 'backend/'

  # Build RL agent
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'europe-west1-docker.pkg.dev/webwar-490207/neohack-repo/rl-agent:$SHORT_SHA'
      - '-f'
      - 'backend/Dockerfile.rl_agent'
      - 'backend/'

  # Push images
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/webwar-490207/neohack-repo/backend:$SHORT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'europe-west1-docker.pkg.dev/webwar-490207/neohack-repo/rl-agent:$SHORT_SHA']

  # Deploy backend
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'neohack-gridlock'
      - '--image=europe-west1-docker.pkg.dev/webwar-490207/neohack-repo/backend:$SHORT_SHA'
      - '--region=europe-west1'

  # Deploy RL agent
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'neohack-rl-agent'
      - '--image=europe-west1-docker.pkg.dev/webwar-490207/neohack-repo/rl-agent:$SHORT_SHA'
      - '--region=europe-west1'

images:
  - 'europe-west1-docker.pkg.dev/webwar-490207/neohack-repo/backend:$SHORT_SHA'
  - 'europe-west1-docker.pkg.dev/webwar-490207/neohack-repo/rl-agent:$SHORT_SHA'
